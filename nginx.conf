# Nginx SPA fallback config (React Router + F5 sem 404)
# Ajuste server_name, SSL e paths conforme seu servidor.
server {
    listen 80;
    server_name _;

    root /var/www/app/dist;
    index index.html;

    # API (opcional, mantém chamadas /api no backend)
    location /api/ {
        proxy_pass https://api.apipainel.com.br;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Cache estático
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # CRÍTICO: fallback SPA para não dar 404 no F5 em rotas internas
    location / {
        try_files $uri $uri/ /index.html;
    }

    # fallback extra para páginas não encontradas
    error_page 404 /index.html;
}
